name: khmer_pdf_fixer
description: "Flutter helpers for rendering Khmer text in generated PDFs with bundled Siemreap font support."
version: 0.1.0

environment:
  sdk: ^3.11.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

